<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>AI Studio Mobile</title>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Studio Mobile</h1>
        <p class="subtitle">Your AI Assistant Interface</p>
        
        <div class="input-section">
            <input type="text" id="userInput" placeholder="Ask me anything...">
            <button onclick="processInput()">Send</button>
        </div>
        
        <div id="output" class="output-section">
            <p class="welcome">Welcome! Type your message and click Send.</p>
        </div>
    </div>
    <script src="main.js"></script>
</body>
                                                     </html>
